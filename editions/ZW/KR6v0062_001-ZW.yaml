body:
  text: 方廣錩天台教典是天台宗編纂的闡述弘揚本宗宗義的典籍集成天台宗是中國佛教史上最早出現的中國佛教宗派與此相應天台教典也是中國佛教史上最早出現的宗派性文匯天台教典的出現是對中國佛教典籍的正統形態大藏經的有力補充對其後各種宗派性專題性文匯的出現都有一定的影響因此對天台教典的研究成為天台宗研究與佛教文獻學研究的重要組成部分之一在拙作八十世紀佛教大藏經史中我曾經對同時期的天台教典作過簡略的研究勾勒了它的概貌本文則想談談它的入藏問題一隋代入藏考辨傳統認為天台教典是北宋天聖年間初次入藏的現在看來這個觀點還值得商榷從現有材料看早在隋代它就曾經被收入皇家內道場修造的皇家官藏天台教典是智者大師逝世後由其高足章安灌頂在隋煬帝楊廣的支持下編纂而成關於天台教典與灌頂及楊廣的關係佛祖統記的作者南宋志磐是這樣敘述的昔如來涅槃阿難結集今智者示滅章安結集阿難結集之際闍王指摩揭陀國阿闍世王方按送供一夏章安結集之日煬帝送供十年挹流尋源智者如東土一佛章安有似阿難煬帝外護有同闍王亦即志磐認為天台教典是在楊廣的直接支持下產生的事實的確如此智者大師是開皇十七年十一月二十四日逝世的第二年正月灌頂奉命與普明一起自天台至揚州向當時駐於揚州的晉王楊廣奉上智者大師的遺書及所撰淨名義疏三十一卷二月楊廣遣使致意並稱不獲親承義疏為之悔恨即為沒有親耳聽到智者大師講解淨名義疏而遺憾佛祖統記還記載了這樣一個故事王指晉王楊廣方按初覽遺書對淨名疏而立愿曰昔親奉師顏未能咨決今承遺旨何由可悟若尋文生解愿示神通夜夢群僧集閣王自說義見智者飛空而至寫七寶珊瑚於閣還復飛去上述資料說明無論隋王朝在政治上對智顗如何疑忌但楊廣對智者所弘揚的天台理論仍甚為心折並為智者大師逝世巨匠隕落而歎息因此很可能由此萌發結集智者著作的想法並授意灌頂具體進行灌頂從陳後主至德初年師從智者到隋文帝開皇十七年智者逝世先後共十餘年史載他侍從智者聽受之次悉與結集大小部帙百有餘卷傳諸未聞師之功也因此他來集結智者大師的遺著應該說是很恰當的人選志磐稱頌道章安侍右以一遍記之才筆為論疏垂之將來殆與慶喜即阿難方按結集同功而比德也微章安吾恐智者之道將絕聞於今日矣楊廣對智者及天台理論的這種態度他與天台教典的這種關係是天台教典於隋代入藏的直接原因智者大師立宗的南北朝晚期及隋朝初期正是我國大藏經正式形成的時期這時的大藏經特別是北方編纂的大藏經的一個顯著特點就是基本上祇收域外傳入的翻譯佛典而將中華佛教撰著排除在外即使收入若干中國僧人的著作大抵也局限在僧史音義法苑法集之類毗贊佛教有功的著作上在這裡隋開皇年間編纂的歷代三寶記就是一個典型的例子歷代三寶記首創以入藏錄載錄所有入藏典籍的體例成為我國大藏經理論自覺的一個標誌但在歷代三寶記的入藏錄中連一部中國人的撰述也不收也許正是因為這一原因促使天台教典這樣專門弘揚本宗教義的中華佛教撰著祇能在藏外另行結集隋煬帝雖然是歷史上著名的亡國之君但本人風流蘊藉雅好文事即位之後他翻抄秘閣圖書收聚古跡名畫又於內道場集佛經道經別撰目錄關於這部在內道場修造的大藏經隋書經籍志是這樣記載的大業時又令沙門智果於東都內道場撰諸經目分別條貫以佛所說經為三部一曰大乘二曰小乘三曰雜經其餘似後人假托為之者別為一部謂之疑經又有菩薩及諸深解奧義贊明佛理者名之為論及戒律並有大小及中三部之別又所學者錄其當時行事名之為記凡十一種該藏的具體結構與收經數如下一大乘經部卷其中經部卷疏部卷二小乘經部卷三雜經部卷四雜疑經部卷五大乘律部卷六小乘律部卷其中律部卷疏部卷七雜律部卷八大乘論部卷其中論部卷疏部卷九小乘論部卷其中論部卷疏部卷十雜論部卷其中論部卷疏部卷十一記部卷以上總計部卷根據隋費長房歷代三寶記卷十五歷代三寶記入藏錄收入大乘經律論部卷小乘經律論部卷總計部卷兩相比較智果在內道場所造的這部藏經要比費長房審定的藏經多出部卷多出的部分絕大部分是中華佛教撰著根據天台宗史佛祖統記山家教典史傳教大師將來台州錄及其它有關材料智果造藏時天台教典的規模尚小大體包括有慧思智者及灌頂三人的著作約餘部餘卷與上述智果造藏經所收中華佛教撰著總數相比祇占很小一部分考慮到當時的佛教諸派別中楊廣與天台宗的關係最為密切天台教典本身又是在他的直接支持下結集的則天台教典此時被收入遵照楊廣之命而編纂的這部內道場藏經中應該是順理成章的事當然應該指出當時大藏經的主流形態是基本不收中華佛教撰著所以智果所編纂的這部內道場藏經屬於非主流形態雖然這是一部皇家官藏但當時的皇家官藏對各地藏經缺乏權威性與規範力各地藏經的形態由各地造藏僧人自行決定百花齊放再說隋祚短促如同煬帝特意到揚州觀賞的曇花因此雖說天台教典在隋代曾經被收入東都內道場的大藏經中但從全局看此事並不足以改變它在宋以前基本上一直被排斥在大藏經之外這一總體格局二天聖入藏考辨入藏時間佛祖統記卷四十五載宋仁宗天聖二年詔賜天台教文入藏及賜白金百兩飯靈山千眾慈云撰教藏隨函目錄述諸部著作大意從這條材料看天台教典應於天聖二年入藏但北宋景祐年間呂夷簡等人所編景祐新修法寶錄卷十七則稱天台教典是天聖四年入藏的天聖四年四月內出天台智者科教經論一百五十卷令三藏惟淨集左右街僧職京城義學文學沙門二十人同加詳定編錄入藏詔杭州搜訪印版並令附驛以進有闕者付印經院刊鏤景祐新修法寶錄上距天聖四年僅年左右上述記述清晰詳盡完全是當時情況的實錄顯然比南宋僧人志磐的記載更加可靠因此天台教典應於天聖四年年入藏佛祖統記記載有誤根據景祐新修法寶錄的上述記載入藏的天台教典是由大內發出的計卷由惟淨組織京城僧人校訂後入藏在這之前在杭州當時的書籍刊印中心之一已經刊印了其中的若干典籍所以詔令杭州搜羅那些已刊經版送到京師印經院至於未刊部分則由印經院負責刊鏤補齊由於北宋的官版藏經祇有一部即著名的開寶藏該開寶藏經版其時存於印經院因此邏輯的結論祇有一個天台教典在天聖四年被賜入藏就是被增入開寶藏從此天台教典成為開寶藏的組成部分所繫帙號我國刻本藏經都用千字文帙號來表示某部典籍在大藏經中的具體位置並作為檢索號天台教典賜入開寶藏之後所繫的千字文帙號是什麼這個問題實際涉及我國第一部版刻藏經開寶藏的目錄復原與研究牽一髮而動全身景祐新修法寶錄是這樣講的天聖四年五月復出唐慈恩寺翻經法師窺基所著經論章疏四十三卷令編聯入藏惟淨等請以智者慈恩二書附於開元錄東土集傳之次上文的意思是當時仁宗要求將這些典籍編聯入藏亦即按照千字文順序排字給號增入開寶藏但惟淨等提出應將它們置於開元入藏錄賢聖集傳的東土集傳之後也就是插在當時開寶藏的第帙與第帙之間關於這一問題下文還要涉及如果說卷天台教典大體編為帙卷窺基著作大體編為帙總計可以編為帙則這批典籍的千字文帙號應該從杜字號到給字號從天聖釋教總錄看天台教典的入藏及帙號天聖五年惟淨等編纂了一部新的大藏經目錄天聖釋教錄由於這部目錄編纂於天台教典入藏之第二年對我們研究天台教典的入藏問題自然有密切關係佛祖統記載天聖五年三藏惟淨進大藏經目錄二帙賜名天聖釋教錄凡六千一百九十七卷景祐新修法寶錄沒有關於該天聖釋教錄的記載但在天聖五年條下有這樣一條記事五年春二月三藏沙門法護惟淨上言傳譯之興自漢永平丁卯迄唐正貞元己巳歷十九代凡七百二十四年所出三藏教文七千四百餘卷自是輟翻譯者一百九十三祀聖宋啟運像教中興太祖皇帝遺遣僧西游以訪梵典太宗皇帝肇興譯館廣演秘文真宗皇上繼闡真乘增新華藏迄於天聖凡四十六載所出教文五百一十六卷近者五天竺所貢經葉多是已備之文鮮得新經翻譯法護愿回天竺惟淨乞止龍門山寺仍錄前代譯經三藏十五人罷譯故事以聞表入留中不報潤文樞密副使夏竦亦奏其事未之許也上文說明惟淨等因為當時已經已無新經可譯所以擬停止翻譯事業在停譯前他們編纂了一個經錄將前代的譯經事業作了一個總結此事還是可信的根據佛祖統記該天聖釋教錄共二帙即二十卷收經卷景祐新修法寶錄稱從漢代到宋天聖年間共出經多卷兩者相差餘卷這是由於一個記錄的是實際入藏數一個記錄的是歷代出經數由於歷代所出經有不少已經亡佚無存僅有其目故有上述之差數該天聖釋教錄雖然已經亡佚但它的簡目天聖釋教總錄的殘本還保存在趙城金藏中該總錄原為三冊它與天聖釋教錄的關係應該如同開元釋教錄入藏錄與開元釋教錄一樣因單獨別行故稱總錄現上冊己佚中冊亦殘下冊首殘餘尚完整它是當時全部入藏典籍的總目錄也是惟淨心目中開寶藏的標準目錄從現存殘冊看該總錄上中兩冊著錄原開元入藏錄的經典下冊著錄新編入藏經典總體收經情況如下一開元舊錄部分帙天英二附續新編部分帙杜兵三廣品歷章附貞元續開元錄帙高陪四貞元續開元錄所收部分帙輦伊五大中祥符錄所收部分帙尹煩六大中祥符錄後新出經帙刑威以上總計帙由於我們對開元入藏錄所載諸經比較熟悉所以上中兩冊的佚殘對我們瞭解該兩冊的內容並不會造成多大的影響遺憾的是由於下冊首殘存文從上述第三部分廣品歷章起故第二部分附續新編部分所收的帙具體是什麼經典現在已無從確認如前所述天台教典恰恰就應編排在這一部分雖說現存的天聖釋教總錄殘冊無從證實天台教典的存在但前一年正是惟淨本人提出將天台慈恩的著作續編在開元入藏錄之後而在惟淨所編的天聖釋教總錄下冊末尾又這樣說右天聖釋教總錄中都收開元舊錄並附續新編及正貞元法寶等錄共計六百二帙六百二號既稱新編自然應該是編入不久的則我們有理由認為在天聖釋教錄的附續新編部分從杜到兵的帙中應該包括天台教典及慈恩著作如前所述上述兩類著作可以編為帙則在附續新編部分的帙中除了上述天台慈恩之卷外還收入一些其他若干著作問題的提出呂澂先生在所撰宋代佛教中這樣說天聖時所編新錄稱天聖釋教總錄三卷亦稱三冊譯經三藏惟淨和譯場職事僧人等同編它係當時全部入藏經典的目錄記載著開元錄各經新編入藏的天台慈恩兩家著述貞元錄各經祥符錄各經再附載其後新譯各經一共六百零二帙六千一百九十七卷呂澂先生在上述論述中確認天台教典在天聖年間入藏並編入天聖釋教總錄這一事實由於天聖釋教總錄所收之經典均編有千字文帙號所以上述論述等於肯定天台教典都編有千字文帙號按照現存天聖釋教總錄的體例這些天台教典的千字文帙號必然如前所述在從杜到兵這個字中但是在宋刻蜀版藏經一文中呂澂先生又認為開寶藏的千字文帙號祇編到轂並且從杜到轂共個字計帙所收全部為從太平興國七年到咸平二年的宋代新譯經其後入藏的所有經典包括前面提到的天台慈恩兩宗章疏都沒有編千字文帙號呂澂先生的上述文章都肯定了天台教典的入藏但在入藏後的帙號問題上是自相矛盾的童瑋先生的北宋開寶大藏經雕印考釋及目錄還原對這個問題是這樣講的惟淨等請以智者慈恩二書附於開元錄東土集傳之次這樣便形成了開寶藏的再校增補本天台宗的科教經論等納入千字文順序帙號始於後來的崇寧毗盧兩藏這段話也是自相矛盾的因為說它們增入開寶藏時乃附於開元錄東土集傳之次就等於說它們在開寶藏中已經編有千字文帙號而說它們納入千字文順序帙號始於後來的崇寧毗盧兩藏則又是說它們在開寶藏中還沒有帙號童瑋先生此處的自相矛盾與前述呂澂先生的自相矛盾如出一轍不過看來童瑋先生並不贊同呂澂先生的開寶藏帙號祇到轂字號其後諸典籍均不編號的觀點在目錄復原中他對開寶藏所收的典籍統統給予千字文帙號其帙號一直編到洞字號由於童瑋先生沒有把天台教典收入該目錄復原由此證明童瑋先生還是傾向天台教典沒有千字文帙號但是童瑋先生在開寶藏的目錄復原中根本不收天台教典本身又等於從目錄角度否定了天台教典曾經增入開寶藏這一事實這顯然是不合適的台灣蔡運辰先生所編二十五種藏經目錄對照考釋既沒有提到天台教典增入開寶藏這一事實也沒有在開寶藏項下列入天台教典完全迴避了這一問題那麼天台教典增入開寶藏後到底有無千字文帙號是什麼帙號開寶藏的流通形態在此必須先談談天聖五年以前開寶藏的流通形態開寶藏刊刻以前我國的藏經大體有三種流通形態有的所造僅為開元入藏錄部分有的依據圓照的貞元續開元錄增補後續部分有的則依據恒安的續貞元錄增補後續部分在四川初刊的開寶藏雖有萬版片實際所刊僅為開元入藏錄部分共帙千字文帙號從天到英以下稱開元舊錄部分這樣就產生一個增補開元入藏錄未收經典的問題但開寶藏既未增補貞元續開元錄部分也未增補續貞元錄部分而是首先增補前述呂澂先生提到的從太平興國七年到咸平二年宋朝新譯的卷典籍計帙千字文帙號從杜到轂以下稱宋譯一部分此後又依據貞元續開元錄增補了開元入藏錄未收的卷典籍計帙由於廣品歷章是開元入藏錄的詳目貞元續開元錄是新增補經典的總目所以把這兩部經錄合為帙放在前述帙之前總計帙千字文帙號從振到奄以下稱續補部分由於上述兩批典籍是在不同時期分別增補的因此它們的流傳情況也不一樣有的寺院有收藏有的寺院沒有收藏所以北宋崇寧年間撰寫大藏經綱目指要錄的惟白在他的這部著作中基本上祇介紹開元舊錄部分並在卷八介紹說通前計大小乘經律論總五千四十餘卷四百八十帙以開元釋教錄為準則今撮略品目所集也其餘隨藏添賜經傳三十帙未入藏經二十七帙天下寺院藏中或有或無印經官印板卻足故未錄略在知者可鑒耳上文的經傳三十帙就是宋譯一部分上文的未入藏經二十七帙就是續補部分在這個過程中還不斷有一些新的典籍送到印經院隨藏流通如御制蓮華心輪迴文等開始時它們並沒有按照千字文排序給號但當它們隨著開寶藏傳入高麗卻被收入高麗藏所以造成其後這些典籍在高麗藏與趙城金藏中的帙號不同此外新的經典還在源源不斷地譯出不斷地送到印經院入藏流通關於這一點在大中祥符法寶錄等宋代經錄中有詳盡的記載也就是說開寶藏實際可以分為正藏與續藏兩個部分正藏是開元入藏錄部分形態比較固定續藏是其後增補的部分形態還沒有固定續藏是其後增補的部分形態還沒有固定所謂沒有固定主要表現在兩個方面一個是後續典籍不斷湧現從而不斷編聯新的千字文帙號隨藏流通另一個是部分典籍雖然沒有千字文帙號但也在不斷增加並隨藏流通天聖五年時開寶藏已經增長到哪一個字號還需要進一步研究但起碼我們現在可以列出直到奄字號的各種典籍亦即一天到英開元舊錄部分帙二杜到轂宋譯一部分帙三振到奄續補部分帙從有關資料看此時在奄字號以下至少還編了個字也就是說自開元舊錄部分以下至少增加帙祇是具體內容還需要深入考證問題的癥結瞭解上述背景我們就可以明白在天台教典問題上出現種種矛盾說法的癥結所在如前所述天聖四年仁宗欲將天台教典及慈恩章疏收歸入藏當時仁宗要求將這些典籍編聯入藏亦即按照前此已經形成的開寶藏增補慣例將天台慈恩典籍接在已經入藏的諸種典籍後面繼續按照千字文順序排字給號但惟淨提出不同意見請以智者慈恩二書附於開元錄東土集傳之次也就是要插在當時開寶藏的開元舊錄部分與宋譯一部分之間這就完全打亂了開寶藏的既成結構惟淨為什麼要提出這樣的建議這祇要看看第二年惟淨所編的天聖釋教總錄就可以明白首先惟淨把全部入藏典籍分為三大部分開元舊錄部分宋代以前部分宋代新出部分所謂開元舊錄部分即指開元入藏錄部分也就是開寶藏的正藏部分共帙所謂宋代以前部分指宋代以前所出的佛教典籍它又包括二部分典籍一宋仁宗要求收歸入藏的天台慈恩典籍及其他若干典籍計帙二前述之續補部分即廣品歷章貞元續開元錄以及貞元續開元錄所收典籍計帙從時代講第一部分典籍最早與開元舊錄部分年代相當第二部分典籍的年代晚於開元錄這也就是惟淨堅持要把天台慈恩典籍緊插在開元舊錄部分之後的原因所謂宋代新出部分即宋代譯纂的佛經這批典籍也分為兩個部分一大中祥符錄所收部分帙二大中祥符錄後新出經帙第一部分的典籍本來是隨譯出隨入藏但現在惟淨按照開元入藏錄大小乘經律論賢聖集傳的體例全部重新作了整理第二部分則大體按照譯出的年代先後排序也就是說開寶藏的續藏部分本來是一個大雜燴沒有什麼結構體例可言但在天聖釋教錄中惟淨對開寶藏的結構作了大規模的調整以使各種典籍的編排更加符合其年代的先後順序與內容的思想傾向經過惟淨這樣一整理開寶藏的結構的確要合理得多由此看來惟淨編纂天聖釋教錄是在已經沒有多少新經可譯因而佛教典籍的數量已可基本穩定的情況下利用天台慈恩典籍入藏的機會對前人的譯經作了一番系統的整理以使大藏經的結構體例更加合理便於使用但問題隨之而來從太平興國八年開寶藏刊刻完成到天聖五年惟淨重編目錄多年間開寶藏至少已經增加了帙千字文帙號也由英字號至少已編到實字號這些典籍已經刊刻流通現在惟淨重編新目調整次序則已經刊刻的那些經版的帙號如何處理是按照天聖釋教錄挖改其帙號還是一仍其舊我們甚至可以提出這樣的問題惟淨的這一改革方案最終是否得到最高當局的批准得以實施從景祐新修法寶錄祇提及惟淨整理佛典卻避而不談天聖釋教錄來看惟淨的方案並沒有得到批准自然也不可能實施實際上現在由趙城金藏保存下來的天聖釋教總錄版式既與開寶藏與趙城金藏不類也沒有千字文帙號就是說這部著作就沒有正式入藏是以單本形式附藏流通的另外從初刻高麗藏再刻高麗藏守其別錄趙城金藏來看惟淨的方案的確沒有被實施在這裡趙城金藏特別值得我們注意該藏開雕於金皇統九年南宋紹興十九年由晉南民間人士發起勸募按照開寶藏覆刻由於並無什麼飽學義學僧參與其間因此可以想見它覆刻開寶藏時祇能原樣照刻可能在最後增補若干典籍但不可能對原藏結構作大規模的修訂調整趙城金藏天到奄的結構如下天到英帙開元舊錄部分杜到轂帙宋譯一部分振到奄帙續補部分與我們前面討論的開寶藏結構完全相同從而證明上述推論的正確天台教典與慈恩章疏在趙城金藏中的位置如下岫到畝帙天台教典我到庶帙慈恩章疏這也說明天台慈恩典籍實際上並沒有象惟淨所計劃的那樣插入到開寶藏的英字號與杜字號之間由此我們可以知道所謂天聖釋教錄祇是惟淨自己對開寶藏的一個修訂計劃既沒有得到批准也沒有真正實施這就是問題的癥結結論我們應該肯定天台教典於天聖四年收編入藏至於天台教典入藏後所繫的千字文帙號是什麼我們先看看天台教典在當時其餘各藏中的帙號年開雕初刻高麗藏無年開雕崇寧藏更到虢帙年開雕毗盧藏同上年開雕趙城金藏岫到畝帙年開雕再刻高麗藏無由此可以證明天台教典雖然收歸入藏起碼在相當長的時間內一直沒有繫上千字文帙號其流通方式也與開寶藏續藏的其他典籍一樣缺乏周遍性至於趙城金藏中天台教典的帙號是否即為承襲開寶藏後期帙號所得亦即開寶藏後期是否曾為天台教典編繫帙號這個問題涉及趙城金藏目錄與開寶藏目錄的關係還要再研究餘論童瑋先生北宋開寶大藏經雕印考釋及目錄還原以天聖釋教總錄為基礎來復原開寶藏的續藏部分如上所述天聖釋教總錄祇是一個擬議中的私家目錄其改革措施並未付諸實踐與當時流通的開寶藏完全不同所以恐怕不能把它作為復原開寶藏續藏部分的目錄基礎年月
